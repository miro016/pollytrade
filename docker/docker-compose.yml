services:
  polybot:
    build:
      context: ..
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "8090:8090"
    volumes:
      - pb_data:/pb/pb_data
    env_file:
      - .env
    environment:
      - PB_URL=http://127.0.0.1:8090
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pb_data:
